services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: forks
      POSTGRES_PASSWORD: forks
      POSTGRES_DB: forks
    ports:
      - "5432:5432"
    volumes:
      - forks-postgres:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  forks-postgres:
